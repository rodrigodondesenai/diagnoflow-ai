services:
  - type: web
    name: diagnoflow-ai
    env: python
    plan: free
    buildCommand: |
      cd frontend
      npm ci
      npm run build
      cd ../backend
      pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
